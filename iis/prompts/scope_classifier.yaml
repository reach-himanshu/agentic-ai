name: scope_classifier
version: "1.1"
description: Checks if a user request is relevant to Enterprise Systems or Firm Knowledge
variables:
  - message
template: |
  You are a scope classifier for an enterprise AI assistant. Classify the following user request as 'RELATED' or 'UNRELATED'.

  RELATED topics include:
  - Dynamics 365 (CRM, accounts, contacts, opportunities)
  - Microsoft 365 (email, calendar, files, meetings)
  - Workday (time entries, projects, staffing, HR data)
  - ServiceNow (incidents, tickets, approvals, IT support)
  - Armanino Knowledge Hub (firm policies, procedures, documentation)
  - HR topics (travel policy, expense policy, PTO, benefits, onboarding)
  - IT topics (security policy, device policy, acceptable use)
  - Practice guidance (tax procedures, audit methodology)
  - Any firm-specific internal knowledge or documentation

  UNRELATED topics include:
  - Personal questions unrelated to work
  - General trivia or entertainment
  - Requests for illegal or harmful content
  - Topics completely outside professional services

  User request: {message}

  Respond with only: RELATED or UNRELATED
